<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>PDF Vocab 设置</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1a1a1a;
      background: #fff;
      padding: 24px;
    }
    main { max-width: 760px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 18px; }
    h2 { font-size: 14px; margin-bottom: 10px; color: #2a3441; }
    section {
      border: 1px solid #d9e2ec;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      background: #fafcff;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .row { display: flex; gap: 12px; }
    .row > * { flex: 1; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccd5df;
      border-radius: 8px;
      font-size: 13px;
      background: #fff;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #2a3441;
      margin-top: 12px;
    }
    .checkbox-row input { width: auto; }
    .checkbox-list {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .actions { display: flex; gap: 10px; margin-top: 14px; }
    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      background: #fff;
    }
    .btn-primary { background: #4a90d9; color: #fff; }
    .btn-outline { color: #4a90d9; border: 1px solid #4a90d9; }
    .status { font-size: 12px; margin-top: 8px; min-height: 16px; color: #888; }
    .status.ok { color: #2a8c4a; }
    .status.err { color: #c92a2a; }
    .token-badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      margin-left: 8px;
    }
    .token-badge.ok { background: #d4edda; color: #155724; }
    .token-badge.err { background: #f8d7da; color: #721c24; }
    pre {
      background: #1a1a1a;
      color: #0f0;
      font-size: 11px;
      padding: 10px;
      border-radius: 8px;
      max-height: 420px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.45;
      font-family: "Courier New", monospace;
    }
  </style>
</head>
<body>
  <main>
    <h1>PDF Vocab 设置</h1>

    <section>
      <div class="section-head">
        <h2>授权</h2>
        <span id="tokenBadge" class="token-badge"></span>
      </div>
      <button class="btn btn-outline" id="authBtn">WPS 授权登录</button>
      <div class="status" id="authStatus"></div>
    </section>

    <section>
      <h2>规则</h2>
      <div class="row">
        <div>
          <label for="hideBelow">隐藏低于</label>
          <select id="hideBelow"></select>
        </div>
        <div>
          <label for="collectAtOrAbove">默认收录</label>
          <select id="collectAtOrAbove"></select>
        </div>
      </div>
      <label style="margin-top:12px;">默认收录分类</label>
      <div id="categoryList" class="checkbox-list"></div>
      <div class="status" id="rulesStatus"></div>
    </section>

    <section>
      <h2>测试翻译</h2>
      <div class="actions" style="margin-top:0;">
        <button class="btn btn-outline" id="testBtn">运行测试</button>
      </div>
      <div class="status" id="testStatus"></div>
    </section>

    <section>
      <div class="section-head">
        <h2>调试日志</h2>
        <div class="actions" style="margin-top:0;">
          <button class="btn btn-outline" id="copyLogBtn">复制</button>
          <button class="btn btn-outline" id="clearLogBtn">清空</button>
        </div>
      </div>
      <pre id="debugLog">等待操作...</pre>
    </section>
  </main>

  <script src="options.js"></script>
</body>
</html>
