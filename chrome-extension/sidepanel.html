<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px; color: #1a1a1a; background: #fff; padding: 16px;
    }
    h2 { font-size: 15px; margin-bottom: 8px; }
    h3 { font-size: 13px; margin: 14px 0 6px; color: #555; }
    section { margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 3px; }
    input, select { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; margin-bottom: 6px; }
    input:focus, select:focus { outline: none; border-color: #4a90d9; box-shadow: 0 0 0 2px rgba(74,144,217,0.15); }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    .btn { width: 100%; padding: 8px 12px; border: none; border-radius: 4px; font-size: 13px; cursor: pointer; margin-bottom: 6px; }
    .btn-primary { background: #4a90d9; color: #fff; }
    .btn-primary:hover { background: #3a7bc8; }
    .btn-small { width: auto; padding: 6px 12px; margin-bottom: 0; white-space: nowrap; }
    .btn-outline { background: #fff; color: #4a90d9; border: 1px solid #4a90d9; }
    .btn-outline:hover { background: #f0f6ff; }
    .status { font-size: 12px; color: #888; margin-top: 4px; min-height: 16px; }
    .status.ok { color: #2a8c4a; }
    .status.err { color: #c92a2a; }
    hr { border: none; border-top: 1px solid #eee; margin: 12px 0; }
    .help { font-size: 11px; color: #999; margin-top: 2px; }
    .token-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; margin-left: 4px; }
    .token-badge.ok { background: #d4edda; color: #155724; }
    .token-badge.err { background: #f8d7da; color: #721c24; }
    .word-record {
      background: linear-gradient(180deg, #fbfcfe 0%, #f2f5f9 100%);
      border: 1px solid #d9e2ec;
      border-radius: 14px;
      padding: 18px;
      min-height: 168px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }
    .record-title {
      display: block;
      font-size: 15px;
      font-weight: 600;
      color: #445469;
      margin-bottom: 10px;
    }
    .record-row {
      padding: 10px 0;
      border-bottom: 1px solid #e5ebf2;
    }
    .record-row:last-child { border-bottom: none; }
    .record-label {
      display: block;
      font-size: 12px;
      line-height: 1.2;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7a8c;
      margin-bottom: 6px;
    }
    .record-value {
      display: block;
      font-size: 30px;
      line-height: 1.22;
      color: #17212b;
      word-break: break-word;
    }
    .record-value-note {
      font-size: 24px;
      color: #344256;
    }
    .word-record-error {
      background: linear-gradient(180deg, #fff6f6 0%, #feecec 100%);
      border-color: #f1b7b7;
      box-shadow: 0 10px 24px rgba(120, 28, 28, 0.08);
    }
    .record-label-error { color: #b42318; }
    .record-value-error { color: #7a271a; }
  </style>
</head>
<body>

<h2>PDF Vocab — 生词本</h2>

<section>
  <h3>授权</h3>
  <button class="btn btn-outline" id="authBtn">WPS 授权登录</button>
  <span style="font-size:11px;margin-left:4px;" id="tokenBadge"></span>
  <div class="status" id="authStatus"></div>
  <div class="help">首次使用或 Token 过期时点击授权。</div>
</section>

<section>
  <button class="btn btn-primary" id="saveBtn" style="display:none">保存</button>
  <button class="btn btn-outline" id="testBtn" style="width:100%;">测试: 添加 "recurrence"</button>
</section>

<hr />

<section>
  <div id="wordRecord" class="word-record"></div>
</section>

<section>
  <h3>调试日志
    <button class="btn-small btn-outline" id="copyLogBtn" style="width:auto;">复制</button>
    <button class="btn-small btn-outline" id="clearLogBtn" style="width:auto;">清空</button>
  </h3>
  <pre id="debugLog" style="background:#1a1a1a;color:#0f0;font-size:10px;padding:8px;border-radius:4px;max-height:300px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;font-family:'Courier New',monospace;line-height:1.4;">等待操作...</pre>
</section>

<script src="sidepanel.js"></script>
</body>
</html>
