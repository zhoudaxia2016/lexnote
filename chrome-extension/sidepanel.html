<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
      padding: 16px;
    }
    h2 { font-size: 15px; margin-bottom: 12px; }
    section { margin-bottom: 14px; }
    .word-record {
      background: linear-gradient(180deg, #fbfcfe 0%, #f2f5f9 100%);
      border: 1px solid #d9e2ec;
      border-radius: 14px;
      padding: 18px;
      min-height: 140px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }
    .word-record-error {
      background: linear-gradient(180deg, #fff6f6 0%, #feecec 100%);
      border-color: #f1b7b7;
      box-shadow: 0 10px 24px rgba(120, 28, 28, 0.08);
    }
    .record-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      color: #445469;
      margin-bottom: 10px;
    }
    .record-title-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }
    .ghost-btn,
    .speak-btn {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 13px;
      line-height: 1;
      cursor: pointer;
      background: #fff;
    }
    .ghost-btn {
      border: 1px solid #d6dee8;
      color: #445469;
    }
    .speak-btn {
      border: 1px solid #c9d5e2;
      color: #355070;
    }
    .speak-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }
    .record-row {
      padding: 10px 0;
      border-bottom: 1px solid #e5ebf2;
    }
    .record-row:last-child { border-bottom: none; }
    .record-label {
      display: block;
      font-size: 12px;
      line-height: 1.2;
      color: #6b7a8c;
      margin-bottom: 6px;
    }
    .record-value {
      display: block;
      font-size: 24px;
      line-height: 1.28;
      color: #17212b;
      word-break: break-word;
    }
    .record-value-note { font-size: 22px; color: #344256; }
    .record-value-source { font-size: 18px; color: #344256; }
    .record-value-error { color: #7a271a; }
    .candidate-list {
      display: grid;
      gap: 12px;
    }
    .candidate-card {
      border: 1px solid #d9e2ec;
      border-radius: 14px;
      padding: 14px;
      background: #fff;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
    }
    .candidate-card-error {
      border-color: #f1b7b7;
      background: #fff8f8;
    }
    .candidate-card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .candidate-word-wrap { min-width: 0; }
    .candidate-word-line {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .candidate-word {
      font-size: 26px;
      line-height: 1.2;
      color: #17212b;
      word-break: break-word;
    }
    .candidate-meta-line {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .candidate-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: flex-start;
    }
    .mini-btn {
      border: 1px solid #c9d5e2;
      background: #fff;
      color: #355070;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
    }
    .mini-btn-primary {
      border-color: #4a90d9;
      color: #4a90d9;
    }
    .candidate-row {
      padding-top: 8px;
      border-top: 1px solid #eef2f6;
    }
    .candidate-row-detail {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .candidate-value {
      display: block;
      font-size: 18px;
      line-height: 1.35;
      color: #2a3441;
      word-break: break-word;
    }
    .candidate-value-error { color: #b42318; }
    .candidate-meaning {
      font-size: 18px;
      line-height: 1.35;
      color: #243140;
      font-weight: 600;
      word-break: break-word;
    }
    .candidate-note {
      font-size: 16px;
      line-height: 1.4;
      color: #66758a;
      word-break: break-word;
    }
    .save-badge,
    .category-badge,
    .level-badge {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
    }
    .save-badge-created { background: #e7f6ec; color: #1f6f43; }
    .save-badge-exists { background: #eef2f7; color: #445469; }
    .save-badge-failed { background: #fde8e8; color: #b42318; }
    .save-badge-pending { background: #edf4ff; color: #2353a7; }
    .category-badge { background: #fff3d6; color: #855b00; }
    .level-badge { background: #eef4ff; color: #3659a2; }
  </style>
</head>
<body>
  <h2>PDF Vocab — 生词本</h2>

  <section>
    <div id="wordRecord" class="word-record"></div>
  </section>

  <section>
    <div id="candidateList" class="candidate-list"></div>
  </section>

  <script src="sidepanel.js"></script>
</body>
</html>
